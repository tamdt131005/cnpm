<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Quản lý Tài khoản</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;700;800&family=Sora:wght@600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="../../assets/css/style.css" />
    <link rel="stylesheet" href="./users-manage.css" />
</head>

<body>
    <div class="page-shell app-layout">
        <admin-sidebar></admin-sidebar>

        <main class="content-pane">
            <app-topbar title="Quản lý tài khoản" subtitle="Cập nhật thông tin, đổi mật khẩu và khóa tài khoản"></app-topbar>

            <section class="dashboard-toolbar">
                <p class="breadcrumb">Admin / Tài khoản / Quản lý</p>
                <div class="user-manage-actions">
                    <a class="btn btn-ghost" href="./dashboard.html">Dashboard</a>
                    <a class="btn btn-ghost" href="./users-create.html">Tạo Tài khoản mới</a>
                </div>
            </section>

            <section class="stat-grid">
                <article class="stat-card">
                    <p>Tổng tài khoản</p>
                    <h3 id="user-stat-total">0</h3>
                </article>
                <article class="stat-card">
                    <p>Admin</p>
                    <h3 id="user-stat-admin">0</h3>
                </article>
                <article class="stat-card">
                    <p>Kế toán</p>
                    <h3 id="user-stat-staff">0</h3>
                </article>
                <article class="stat-card">
                    <p>Tài khoản đang khóa</p>
                    <h3 id="user-stat-locked">0</h3>
                </article>
            </section>

            <section class="section card">
                <div class="section-head user-section-head">
                    <h3>Danh sách tài khoản</h3>
                    <div class="user-tools">
                        <select id="user-role-filter" class="select">
                            <option value="">Tất cả vai trò</option>
                            <option value="Admin">Admin</option>
                            <option value="KeToan">Kế toán</option>
                            <option value="SinhVien">Sinh viên</option>
                        </select>
                        <button id="reload-users" class="btn btn-ghost" type="button">Tải lại</button>
                    </div>
                </div>

                <div class="table-wrap">
                    <table class="table">
                        <thead>
                            <tr>
                                <th>Mã</th>
                                <th>Tên đăng nhập</th>
                                <th>Họ tên</th>
                                <th>Email</th>
                                <th>Vai trò</th>
                                <th>Trạng thái</th>
                                <th>Thao tác</th>
                            </tr>
                        </thead>
                        <tbody id="users-body">
                            <tr>
                                <td colspan="7" class="empty">Đang tải danh sách tài khoản...</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </section>
        </main>
    </div>

    <script src="../../assets/js/api.js"></script>
    <script src="../../assets/js/app-shell.js"></script>
    <script src="../../components/components.js"></script>
    <script src="./users-manage.js"></script>
</body>

</html>

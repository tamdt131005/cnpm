<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Quan ly tai khoan</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;700;800&family=Sora:wght@600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="../../assets/css/style.css" />
    <link rel="stylesheet" href="./users-manage.css" />
</head>

<body>
    <div class="page-shell app-layout">
        <admin-sidebar></admin-sidebar>

        <main class="content-pane">
            <app-topbar title="Quan ly tai khoan" subtitle="Cap nhat thong tin, doi mat khau va khoa tai khoan"></app-topbar>

            <section class="dashboard-toolbar">
                <p class="breadcrumb">Admin / Tai khoan / Quan ly</p>
                <div class="user-manage-actions">
                    <a class="btn btn-ghost" href="./dashboard.html">Dashboard</a>
                    <a class="btn btn-ghost" href="./users-create.html">Tao tai khoan moi</a>
                </div>
            </section>

            <section class="stat-grid">
                <article class="stat-card">
                    <p>Tong tai khoan</p>
                    <h3 id="user-stat-total">0</h3>
                </article>
                <article class="stat-card">
                    <p>Admin</p>
                    <h3 id="user-stat-admin">0</h3>
                </article>
                <article class="stat-card">
                    <p>Ke toan</p>
                    <h3 id="user-stat-staff">0</h3>
                </article>
                <article class="stat-card">
                    <p>Tai khoan dang khoa</p>
                    <h3 id="user-stat-locked">0</h3>
                </article>
            </section>

            <section class="section card">
                <div class="section-head user-section-head">
                    <h3>Danh sach tai khoan</h3>
                    <div class="user-tools">
                        <select id="user-role-filter" class="select">
                            <option value="">Tat ca vai tro</option>
                            <option value="Admin">Admin</option>
                            <option value="KeToan">Ke toan</option>
                            <option value="SinhVien">Sinh vien</option>
                        </select>
                        <button id="reload-users" class="btn btn-ghost" type="button">Tai lai</button>
                    </div>
                </div>

                <div class="table-wrap">
                    <table class="table">
                        <thead>
                            <tr>
                                <th>Ma</th>
                                <th>Ten dang nhap</th>
                                <th>Ho ten</th>
                                <th>Email</th>
                                <th>Vai tro</th>
                                <th>Trang thai</th>
                                <th>Thao tac</th>
                            </tr>
                        </thead>
                        <tbody id="users-body">
                            <tr>
                                <td colspan="7" class="empty">Dang tai danh sach tai khoan...</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </section>
        </main>
    </div>

    <script src="../../assets/js/api.js"></script>
    <script src="../../assets/js/app-shell.js"></script>
    <script src="../../components/components.js"></script>
    <script src="./users-manage.js"></script>
</body>

</html>

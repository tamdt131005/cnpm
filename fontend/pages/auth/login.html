<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Đăng nhập | Cổng Thu Học Phí</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;700;800&family=Sora:wght@600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="../../assets/css/style.css" />
    <link rel="stylesheet" href="./login.css" />
</head>

<body>
    <div class="login-wrap">
        <section class="login-panel">
            <span class="kicker">Cổng Thu Học Phí</span>
            <h1 class="login-page-title">Đăng nhập</h1>
            <p class="login-page-copy muted">Vui lòng dùng tài khoản nhà trường cấp.</p>

            <div class="form-card">
                <form id="login-form">
                    <div class="form-body">
                        <div class="form-field">
                            <label for="tenDangNhap">Tài khoản</label>
                            <input class="input" id="tenDangNhap" name="tenDangNhap" placeholder="Nhập tài khoản" required />
                        </div>

                        <div class="form-field">
                            <label for="matKhau">Mật khẩu</label>
                            <input class="input" id="matKhau" name="matKhau" type="password" placeholder="Nhập mật khẩu" required />
                        </div>
                    </div>

                    <div class="form-footer form-footer-left">
                        <button id="login-submit" class="btn btn-primary" type="submit">Đăng nhập</button>
                        <a class="btn btn-ghost" href="../../index.html">Trang chủ</a>
                    </div>
                </form>
            </div>

            <div class="login-help-row">
                <span>Cần hỗ trợ Tài khoản?</span>
                <a href="#">Liên hệ phòng đào tạo</a>
            </div>
        </section>
    </div>

    <script src="../../assets/js/api.js"></script>
    <script src="../../assets/js/app-shell.js"></script>
    <script src="./login.js"></script>
</body>

</html>

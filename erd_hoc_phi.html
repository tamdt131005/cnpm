
<style>
#erd { padding: 1rem 0; overflow-x: auto; }
#erd svg .divider path { stroke-opacity: 0.5; }
#erd svg .row-rect-odd path, #erd svg .row-rect-odd rect,
#erd svg .row-rect-even path, #erd svg .row-rect-even rect { stroke: none !important; }
</style>
<div id="erd"></div>
<script type="module">
import mermaid from 'https://esm.sh/mermaid@11/dist/mermaid.esm.min.mjs';
const dark = matchMedia('(prefers-color-scheme: dark)').matches;
await document.fonts.ready;
mermaid.initialize({
  startOnLoad: false,
  theme: 'base',
  fontFamily: '"Anthropic Sans", sans-serif',
  themeVariables: {
    darkMode: dark,
    fontSize: '13px',
    fontFamily: '"Anthropic Sans", sans-serif',
    lineColor: dark ? '#9c9a92' : '#73726c',
    textColor: dark ? '#c2c0b6' : '#3d3d3a',
  },
});
const src = `erDiagram
    SINHVIEN {
        varchar maSV PK
        varchar hoTen
        date ngaySinh
        boolean gioiTinh
        text diaChi
        varchar email
        varchar soDienThoai
        varchar maLop FK
        enum trangThai
    }
    LOP {
        varchar maLop PK
        varchar tenLop
        int nienKhoa
        varchar maNganh FK
    }
    NGANH {
        varchar maNganh PK
        varchar tenNganh
        varchar maKhoa FK
    }
    KHOA {
        varchar maKhoa PK
        varchar tenKhoa
        varchar truongKhoa
    }
    NAMHOC {
        varchar maNamHoc PK
        varchar tenNamHoc
        int namBatDau
        int namKetThuc
    }
    HOCKY {
        varchar maHocKy PK
        varchar tenHocKy
        int hocKySo
        date ngayBatDau
        date ngayKetThuc
        varchar maNamHoc FK
    }
    MONHOC {
        varchar maMH PK
        varchar tenMH
        int soTinChi
        varchar maKhoa FK
    }
    DANGKYHOC {
        int maDangKy PK
        varchar maSV FK
        varchar maMH FK
        varchar maHocKy FK
        date ngayDangKy
        enum trangThai
    }
    MUCHOCPHI {
        int maMucHP PK
        varchar maMH FK
        varchar maHocKy FK
        decimal giaPerTinChi
        enum loaiSinhVien
    }
    LOAIMIENGIAM {
        int maLoai PK
        varchar tenLoai
        decimal phanTramGiam
        text moTa
    }
    MIENGIAM {
        int maMienGiam PK
        varchar maSV FK
        int maLoai FK
        varchar maHocKy FK
        decimal soTienGiam
    }
    HOADONHOCPHI {
        varchar maHoaDon PK
        varchar maSV FK
        varchar maHocKy FK
        decimal tongTien
        decimal soTienMienGiam
        decimal soTienPhaiTra
        date ngayTaoHD
        date hanThanhToan
        enum trangThai
    }
    THANHTOAN {
        varchar maThanhToan PK
        varchar maHoaDon FK
        varchar maNguoiDung FK
        decimal soTienTT
        datetime ngayThanhToan
        enum phuongThucTT
        text ghiChu
    }
    NGUOIDUNG {
        varchar maNguoiDung PK
        varchar tenDangNhap
        varchar matKhau
        varchar hoTen
        varchar email
        enum vaiTro
        boolean trangThai
    }
    SINHVIEN }|--|| LOP : "thuoc"
    LOP }|--|| NGANH : "thuoc"
    NGANH }|--|| KHOA : "thuoc"
    HOCKY }|--|| NAMHOC : "thuoc"
    SINHVIEN ||--o{ DANGKYHOC : "dang ky"
    MONHOC ||--o{ DANGKYHOC : "trong"
    HOCKY ||--o{ DANGKYHOC : "trong"
    MONHOC ||--o{ MUCHOCPHI : "co"
    HOCKY ||--o{ MUCHOCPHI : "trong"
    SINHVIEN ||--o{ HOADONHOCPHI : "co"
    HOCKY ||--o{ HOADONHOCPHI : "trong"
    HOADONHOCPHI ||--o{ THANHTOAN : "co"
    SINHVIEN ||--o{ MIENGIAM : "duoc huong"
    HOCKY ||--o{ MIENGIAM : "trong"
    LOAIMIENGIAM ||--o{ MIENGIAM : "ap dung"
    NGUOIDUNG ||--o{ THANHTOAN : "thuc hien"`;
const { svg } = await mermaid.render('erd-svg', src);
document.getElementById('erd').innerHTML = svg;
document.querySelectorAll('#erd svg .node').forEach(node => {
  const firstPath = node.querySelector('path[d]');
  if (!firstPath) return;
  const d = firstPath.getAttribute('d');
  const nums = d.match(/-?[\d.]+/g)?.map(Number);
  if (!nums || nums.length < 8) return;
  const xs = [nums[0], nums[2], nums[4], nums[6]];
  const ys = [nums[1], nums[3], nums[5], nums[7]];
  const x = Math.min(...xs), y = Math.min(...ys);
  const w = Math.max(...xs) - x, h = Math.max(...ys) - y;
  const rect = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
  rect.setAttribute('x', x); rect.setAttribute('y', y);
  rect.setAttribute('width', w); rect.setAttribute('height', h);
  rect.setAttribute('rx', '8');
  for (const a of ['fill', 'stroke', 'stroke-width', 'class', 'style']) {
    if (firstPath.hasAttribute(a)) rect.setAttribute(a, firstPath.getAttribute(a));
  }
  firstPath.replaceWith(rect);
});
document.querySelectorAll('#erd svg .row-rect-odd path, #erd svg .row-rect-even path').forEach(p => {
  p.setAttribute('stroke', 'none');
});
</script>
